{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Length</label><input type="number" id="length" value="20" min="4" max="128" class="w-full p-3 border border-gray-300 rounded-lg text-sm"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Count</label><input type="number" id="count" value="5" min="1" max="20" class="w-full p-3 border border-gray-300 rounded-lg text-sm"></div>
    </div>
    <div class="flex flex-wrap gap-4">
        <label class="flex items-center space-x-2 text-sm"><input type="checkbox" id="upper" checked class="rounded"> <span>Uppercase</span></label>
        <label class="flex items-center space-x-2 text-sm"><input type="checkbox" id="lower" checked class="rounded"> <span>Lowercase</span></label>
        <label class="flex items-center space-x-2 text-sm"><input type="checkbox" id="digits" checked class="rounded"> <span>Digits</span></label>
        <label class="flex items-center space-x-2 text-sm"><input type="checkbox" id="symbols" checked class="rounded"> <span>Symbols</span></label>
    </div>
    <button onclick="generate()" class="px-6 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">Generate</button>
    <div id="result" class="space-y-2"></div>
</div>
{% endblock %}
{% block scripts %}<script>async function generate(){const r=await apiCall('/api/password',{length:parseInt(document.getElementById('length').value),count:parseInt(document.getElementById('count').value),uppercase:document.getElementById('upper').checked,lowercase:document.getElementById('lower').checked,digits:document.getElementById('digits').checked,symbols:document.getElementById('symbols').checked});if(r.success){document.getElementById('result').innerHTML=r.result.map(p=>'<div class="flex items-center gap-2"><code class="flex-1 bg-gray-900 text-green-400 p-3 rounded-lg text-sm break-all">'+p+'</code><button onclick="copyToClipboard(\''+p.replace(/'/g,"\\'")+'\', this)" class="px-3 py-2 bg-gray-200 rounded-lg text-sm hover:bg-gray-300 shrink-0">Copy</button></div>').join('');}}generate();</script>{% endblock %}
