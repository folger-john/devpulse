{% extends "tool_base.html" %}
{% block tool_content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div><label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">YAML Input</label><textarea id="input" rows="14" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="name: DevPulse
version: 1.2
tools:
  - json-formatter
  - base64"></textarea></div>
    <div>
        <div class="flex items-center justify-between mb-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Result</label>
            <div class="flex items-center space-x-2">
                <span id="validBadge" class="hidden px-2 py-1 rounded text-xs font-medium"></span>
                <button onclick="copyToClipboard(document.getElementById('output').value, this)" class="px-3 py-1 bg-brand-600 text-white rounded text-xs hover:bg-brand-700">Copy</button>
            </div>
        </div>
        <textarea id="output" rows="14" readonly class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100 rounded-lg text-sm bg-gray-50 dark:bg-gray-800"></textarea>
    </div>
</div>
<div id="errors" class="mt-3 text-sm"></div>
{% endblock %}
{% block scripts %}<script>
async function format(){
    const r=await apiCall('/api/yaml-format',{text:document.getElementById('input').value});
    const badge=document.getElementById('validBadge');
    if(r.success){
        document.getElementById('output').value=r.result;
        badge.textContent=r.valid?'Valid YAML':'Has Warnings';
        badge.className='px-2 py-1 rounded text-xs font-medium '+(r.valid?'bg-green-100 text-green-700':'bg-yellow-100 text-yellow-700');
        badge.classList.remove('hidden');
        document.getElementById('errors').innerHTML=r.errors.length?r.errors.map(e=>'<div class="text-yellow-600 text-xs">'+e+'</div>').join(''):'';
    }
}
document.getElementById('input').addEventListener('input',format);
</script>{% endblock %}
