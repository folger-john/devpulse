{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Text</label><textarea id="input" rows="10" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="Paste or type your text here..."></textarea></div>
    <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="bg-brand-50 p-4 rounded-lg text-center"><div class="text-2xl font-bold text-brand-600" id="words">0</div><div class="text-xs text-gray-500">Words</div></div>
        <div class="bg-brand-50 p-4 rounded-lg text-center"><div class="text-2xl font-bold text-brand-600" id="chars">0</div><div class="text-xs text-gray-500">Characters</div></div>
        <div class="bg-brand-50 p-4 rounded-lg text-center"><div class="text-2xl font-bold text-brand-600" id="sentences">0</div><div class="text-xs text-gray-500">Sentences</div></div>
        <div class="bg-brand-50 p-4 rounded-lg text-center"><div class="text-2xl font-bold text-brand-600" id="readTime">0</div><div class="text-xs text-gray-500">Min Read</div></div>
    </div>
</div>
{% endblock %}
{% block scripts %}<script>document.getElementById('input').addEventListener('input',async function(){const r=await apiCall('/api/word-count',{text:this.value});if(r.success){document.getElementById('words').textContent=r.words;document.getElementById('chars').textContent=r.characters;document.getElementById('sentences').textContent=r.sentences;document.getElementById('readTime').textContent=r.read_time_minutes;}});</script>{% endblock %}
