{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Text or URL</label><input type="text" id="input" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="https://example.com"></div>
    <button onclick="generate()" class="px-6 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">Generate QR Code</button>
    <div id="result" class="flex flex-col items-center space-y-4">
        <img id="qrImg" class="hidden border rounded-lg" width="300" height="300">
        <a id="downloadBtn" class="hidden px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium text-sm" download="qrcode.png">Download PNG</a>
    </div>
</div>
{% endblock %}
{% block scripts %}<script>function generate(){const t=document.getElementById('input').value;if(!t)return;const u='/api/qr-code?text='+encodeURIComponent(t)+'&size=300';document.getElementById('qrImg').src=u;document.getElementById('qrImg').classList.remove('hidden');document.getElementById('downloadBtn').href=u;document.getElementById('downloadBtn').classList.remove('hidden');}</script>{% endblock %}
