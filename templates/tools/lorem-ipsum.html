{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div class="flex items-center gap-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Paragraphs</label><input type="number" id="count" value="3" min="1" max="20" class="w-24 p-3 border border-gray-300 rounded-lg text-sm"></div>
        <button onclick="generate()" class="px-6 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium mt-5">Generate</button>
        <button onclick="copyToClipboard(document.getElementById('output').value, this)" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 font-medium mt-5">Copy</button>
    </div>
    <textarea id="output" rows="12" readonly class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg text-sm"></textarea>
</div>
{% endblock %}
{% block scripts %}<script>async function generate(){const r=await apiCall('/api/lorem-ipsum',{paragraphs:parseInt(document.getElementById('count').value)});if(r.success)document.getElementById('output').value=r.result;}generate();</script>{% endblock %}
