{% extends "tool_base.html" %}
{% block how_to_use %}<p class="text-gray-600 text-sm">Browse the complete list of HTTP status codes below. Use the search box to filter by code number or description.</p>{% endblock %}
{% block tool_content %}
<div class="space-y-4">
    <input type="text" id="search" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="Search status codes... (e.g. 404, not found)">
    <div id="codes" class="space-y-2"></div>
</div>
{% endblock %}
{% block scripts %}<script>
const codes=[
{code:100,text:"Continue",desc:"Server received request headers, client should proceed."},
{code:101,text:"Switching Protocols",desc:"Server switching to protocol requested by client."},
{code:200,text:"OK",desc:"Request succeeded. Standard success response."},
{code:201,text:"Created",desc:"Request fulfilled, new resource created."},
{code:204,text:"No Content",desc:"Request succeeded, no content to return."},
{code:301,text:"Moved Permanently",desc:"Resource has been permanently moved to a new URL."},
{code:302,text:"Found",desc:"Resource temporarily at a different URL."},
{code:304,text:"Not Modified",desc:"Resource not modified since last request. Use cached version."},
{code:400,text:"Bad Request",desc:"Server cannot process request due to client error."},
{code:401,text:"Unauthorized",desc:"Authentication required. Credentials missing or invalid."},
{code:403,text:"Forbidden",desc:"Server understood request but refuses to authorize it."},
{code:404,text:"Not Found",desc:"Requested resource could not be found."},
{code:405,text:"Method Not Allowed",desc:"HTTP method not allowed for this resource."},
{code:408,text:"Request Timeout",desc:"Server timed out waiting for the request."},
{code:409,text:"Conflict",desc:"Request conflicts with current state of the resource."},
{code:410,text:"Gone",desc:"Resource is no longer available and will not return."},
{code:413,text:"Payload Too Large",desc:"Request entity is larger than server is willing to process."},
{code:415,text:"Unsupported Media Type",desc:"Media format of request data is not supported."},
{code:422,text:"Unprocessable Entity",desc:"Request well-formed but semantically erroneous."},
{code:429,text:"Too Many Requests",desc:"User sent too many requests (rate limiting)."},
{code:500,text:"Internal Server Error",desc:"Generic server error. Something went wrong."},
{code:501,text:"Not Implemented",desc:"Server does not support the functionality required."},
{code:502,text:"Bad Gateway",desc:"Server got invalid response from upstream server."},
{code:503,text:"Service Unavailable",desc:"Server temporarily unable to handle the request."},
{code:504,text:"Gateway Timeout",desc:"Upstream server failed to respond in time."}
];
function colorClass(c){if(c<200)return'bg-blue-50 border-blue-200 text-blue-800';if(c<300)return'bg-green-50 border-green-200 text-green-800';if(c<400)return'bg-yellow-50 border-yellow-200 text-yellow-800';if(c<500)return'bg-red-50 border-red-200 text-red-800';return'bg-purple-50 border-purple-200 text-purple-800';}
function render(filter=''){const el=document.getElementById('codes');const f=filter.toLowerCase();const filtered=codes.filter(c=>!f||String(c.code).includes(f)||c.text.toLowerCase().includes(f)||c.desc.toLowerCase().includes(f));el.innerHTML=filtered.map(c=>'<div class="p-4 rounded-lg border '+colorClass(c.code)+'"><div class="flex items-center gap-3"><span class="text-2xl font-bold mono">'+c.code+'</span><span class="font-semibold">'+c.text+'</span></div><p class="text-sm mt-1 opacity-80">'+c.desc+'</p></div>').join('');}
document.getElementById('search').addEventListener('input',e=>render(e.target.value));
render();
</script>{% endblock %}
