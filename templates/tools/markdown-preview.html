{% extends "tool_base.html" %}
{% block head %}<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script><script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>{% endblock %}
{% block tool_content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Markdown</label><textarea id="input" rows="16" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="# Hello World">## Welcome to DevPulse

This is a **Markdown preview** tool.

- Fast rendering
- Real-time preview

```javascript
console.log("Hello!");
```

> Try editing this text!</textarea></div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Preview</label><div id="preview" class="prose prose-sm max-w-none bg-white p-4 border border-gray-300 rounded-lg min-h-[384px] overflow-y-auto"></div></div>
</div>
{% endblock %}
{% block scripts %}<script>const i=document.getElementById('input'),p=document.getElementById('preview');function r(){p.innerHTML=DOMPurify.sanitize(marked.parse(i.value));}i.addEventListener('input',r);r();</script>{% endblock %}
