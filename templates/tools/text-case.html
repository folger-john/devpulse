{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Input Text</label><textarea id="input" rows="4" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="the quick brown fox jumps over the lazy dog"></textarea></div>
    <button onclick="convert()" class="px-6 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">Convert</button>
    <div id="result" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
</div>
{% endblock %}
{% block scripts %}<script>
async function convert(){const r=await apiCall('/api/text-case',{text:document.getElementById('input').value});if(r.success){document.getElementById('result').innerHTML=Object.entries(r.result).map(([k,v])=>'<div class="p-3 bg-gray-50 rounded-lg"><div class="flex justify-between items-center mb-1"><span class="text-xs text-gray-500 font-medium">'+k+'</span><button onclick="copyToClipboard(\''+v.replace(/'/g,"\\'")+'\', this)" class="text-xs px-2 py-1 bg-gray-200 rounded hover:bg-gray-300">Copy</button></div><code class="text-sm text-gray-800 break-all">'+v+'</code></div>').join('');}}
document.getElementById('input').addEventListener('input',convert);
</script>{% endblock %}
