{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div><label class="block text-sm font-medium text-gray-700 mb-1">CSS Input</label><textarea id="input" rows="10" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="body {
    margin: 0;
    padding: 0;
}"></textarea></div>
    <button onclick="minify()" class="px-6 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">Minify</button>
    <div id="statsBar" class="hidden text-sm text-gray-600 bg-green-50 p-3 rounded-lg"></div>
    <div><div class="flex justify-between items-center mb-1"><label class="text-sm font-medium text-gray-700">Minified Output</label><button onclick="copyToClipboard(document.getElementById('output').value, this)" class="text-xs px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">Copy</button></div><textarea id="output" rows="6" readonly class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg text-sm"></textarea></div>
</div>
{% endblock %}
{% block scripts %}<script>async function minify(){const r=await apiCall('/api/css-minify',{text:document.getElementById('input').value});if(r.success){document.getElementById('output').value=r.result;document.getElementById('statsBar').classList.remove('hidden');document.getElementById('statsBar').textContent='Original: '+r.original_size+'B → Minified: '+r.minified_size+'B ('+r.savings_percent+'% saved)';}}</script>{% endblock %}
