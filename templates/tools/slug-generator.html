{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Text</label><input type="text" id="input" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="My Awesome Blog Post Title!"></div>
    <div class="flex gap-4">
        <label class="flex items-center space-x-2 text-sm"><input type="radio" name="sep" value="-" checked class="rounded" onchange="generate()"> <span>kebab-case</span></label>
        <label class="flex items-center space-x-2 text-sm"><input type="radio" name="sep" value="_" class="rounded" onchange="generate()"> <span>snake_case</span></label>
    </div>
    <div><div class="flex justify-between items-center mb-1"><label class="text-sm font-medium text-gray-700">Slug</label><button onclick="copyToClipboard(document.getElementById('output').value, this)" class="text-xs px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">Copy</button></div><input type="text" id="output" readonly class="w-full p-3 bg-gray-900 text-green-400 border border-gray-700 rounded-lg text-sm"></div>
</div>
{% endblock %}
{% block scripts %}<script>
async function generate(){const sep=document.querySelector('input[name="sep"]:checked').value;const r=await apiCall('/api/slug-generate',{text:document.getElementById('input').value,separator:sep});if(r.success)document.getElementById('output').value=r.result;}
document.getElementById('input').addEventListener('input',generate);
</script>{% endblock %}
