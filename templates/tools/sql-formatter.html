{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div><label class="block text-sm font-medium text-gray-700 mb-1">SQL Query</label><textarea id="input" rows="8" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder="select u.id, u.name from users u join orders o on u.id = o.user_id where o.total > 100 order by u.name"></textarea></div>
    <button onclick="format()" class="px-6 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">Format</button>
    <div><div class="flex justify-between items-center mb-1"><label class="text-sm font-medium text-gray-700">Formatted SQL</label><button onclick="copyToClipboard(document.getElementById('output').value, this)" class="text-xs px-3 py-1 bg-gray-200 rounded hover:bg-gray-300">Copy</button></div><textarea id="output" rows="10" readonly class="w-full p-3 bg-gray-900 text-green-400 border border-gray-700 rounded-lg text-sm"></textarea></div>
</div>
{% endblock %}
{% block scripts %}<script>async function format(){const r=await apiCall('/api/sql-format',{text:document.getElementById('input').value});if(r.success)document.getElementById('output').value=r.result;}</script>{% endblock %}
