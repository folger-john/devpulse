{% extends "tool_base.html" %}
{% block tool_content %}
<div class="space-y-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">JWT Token</label>
        <textarea id="input" rows="4" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 text-sm" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
    </div>
    <button onclick="decode()" class="px-6 py-2 bg-brand-600 text-white rounded-lg hover:bg-brand-700 font-medium">Decode</button>
    <div id="result" class="hidden space-y-4 fade-in">
        <div><h3 class="text-sm font-semibold text-gray-700 mb-1">Header</h3><pre id="header" class="bg-gray-900 text-green-400 p-4 rounded-lg text-sm overflow-x-auto"></pre></div>
        <div><h3 class="text-sm font-semibold text-gray-700 mb-1">Payload</h3><pre id="payload" class="bg-gray-900 text-green-400 p-4 rounded-lg text-sm overflow-x-auto"></pre></div>
        <div id="expiryInfo"></div>
    </div>
    <div id="error" class="hidden text-red-600 text-sm bg-red-50 p-3 rounded-lg"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function decode() {
    const r = await apiCall('/api/jwt-decode', { token: document.getElementById('input').value });
    if (r.success) {
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('error').classList.add('hidden');
        document.getElementById('header').textContent = JSON.stringify(r.header, null, 2);
        document.getElementById('payload').textContent = JSON.stringify(r.payload, null, 2);
        if (r.expiry) { document.getElementById('expiryInfo').innerHTML = '<div class="p-3 rounded-lg '+(r.expiry.expired?'bg-red-50 text-red-700':'bg-green-50 text-green-700')+' text-sm"><strong>'+(r.expiry.expired?'Expired':'Valid')+'</strong> — Expires: '+r.expiry.expires+'</div>'; }
    } else { document.getElementById('result').classList.add('hidden'); document.getElementById('error').classList.remove('hidden'); document.getElementById('error').textContent = r.error; }
}
</script>
{% endblock %}
