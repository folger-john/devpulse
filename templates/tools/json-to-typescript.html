{% extends "tool_base.html" %}
{% block tool_content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">JSON Input</label>
        <textarea id="input" rows="14" class="w-full p-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100 rounded-lg focus:ring-2 focus:ring-brand-500 text-sm" placeholder='{"id": 1, "name": "John", "email": "john@example.com", "active": true, "scores": [95, 87, 92]}'></textarea>
    </div>
    <div>
        <div class="flex items-center justify-between mb-1">
            <label class="text-sm font-medium text-gray-700 dark:text-gray-300">TypeScript Interfaces</label>
            <button onclick="copyToClipboard(document.getElementById('output').value, this)" class="px-3 py-1 bg-brand-600 text-white rounded text-xs hover:bg-brand-700">Copy</button>
        </div>
        <textarea id="output" rows="14" readonly class="w-full p-3 bg-gray-900 text-green-400 border border-gray-700 rounded-lg text-sm"></textarea>
    </div>
</div>
<div class="flex items-center gap-3 mt-3">
    <label class="text-sm font-medium text-gray-700 dark:text-gray-300">Root interface name:</label>
    <input type="text" id="rootName" value="Root" class="px-3 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100 rounded-lg text-sm w-32">
</div>
{% endblock %}
{% block scripts %}<script>
async function convert(){
    const r=await apiCall('/api/json-to-typescript',{text:document.getElementById('input').value,rootName:document.getElementById('rootName').value||'Root'});
    document.getElementById('output').value=r.success?r.result:'Error: '+r.error;
}
document.getElementById('input').addEventListener('input',convert);
document.getElementById('rootName').addEventListener('input',convert);
</script>{% endblock %}
